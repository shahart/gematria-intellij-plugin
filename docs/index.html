<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0">
    <link rel="shortcut icon" href="#">
    <title>tsc Gematria</title>
    <style>
        :root {
            --bg-top: #f4ede2;
            --bg-bottom: #d7e6d0;
            --panel: rgba(255, 252, 247, 0.82);
            --panel-strong: #fffaf2;
            --text: #1f2a1f;
            --muted: #5f6e61;
            --accent: #b5552d;
            --accent-dark: #7f3417;
            --line: rgba(70, 86, 68, 0.14);
            --shadow: 0 24px 60px rgba(43, 52, 38, 0.16);
            --radius: 24px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.75), transparent 32%),
                radial-gradient(circle at bottom right, rgba(181, 85, 45, 0.14), transparent 24%),
                linear-gradient(145deg, var(--bg-top), var(--bg-bottom));
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: auto;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(10px);
            opacity: 0.55;
        }

        body::before {
            top: 4rem;
            right: 6vw;
            width: 14rem;
            height: 14rem;
            background: rgba(181, 85, 45, 0.12);
        }

        body::after {
            left: 4vw;
            bottom: 5rem;
            width: 11rem;
            height: 11rem;
            background: rgba(73, 115, 92, 0.14);
        }

        main {
            width: min(980px, calc(100% - 2rem));
            margin: 0 auto;
            padding: 3rem 0 4rem;
        }

        .hero {
            display: grid;
            gap: 1.5rem;
            grid-template-columns: 1.2fr 0.8fr;
            align-items: stretch;
        }

        .panel {
            background: var(--panel);
            backdrop-filter: blur(18px);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .intro {
            padding: 2.5rem;
        }

        .eyebrow {
            display: inline-block;
            margin-bottom: 1rem;
            padding: 0.35rem 0.7rem;
            border-radius: 999px;
            background: rgba(181, 85, 45, 0.1);
            color: var(--accent-dark);
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1, h2 {
            margin: 0;
            font-weight: 600;
            line-height: 1.05;
        }

        h1 {
            font-size: clamp(2.4rem, 5vw, 4.2rem);
        }

        h2 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }

        .lead,
        .card p {
            color: var(--muted);
        }

        .lead {
            max-width: 34rem;
            margin: 1rem 0 0;
            font-size: 1.05rem;
            line-height: 1.7;
        }

        .quick-stats {
            display: grid;
            gap: 1rem;
            align-content: start;
            padding: 1.5rem;
        }

        .stat {
            padding: 1.35rem;
            border-radius: 20px;
            background: rgba(255, 250, 242, 0.82);
            border: 1px solid rgba(70, 86, 68, 0.1);
        }

        .stat strong {
            display: block;
            margin-bottom: 0.3rem;
            font-size: 1.8rem;
            color: var(--accent-dark);
        }

        .workspace {
            display: grid;
            gap: 1.5rem;
            grid-template-columns: 0.95fr 1.05fr;
            margin-top: 1.5rem;
        }

        .card {
            padding: 1.5rem;
        }

        .code-block {
            overflow: auto;
            margin: 0;
            padding: 1.1rem;
            border-radius: 18px;
            background: #1f2521;
            color: #eef3eb;
            font-size: 0.95rem;
            line-height: 1.55;
        }

        .repo-link:hover,
        .repo-link:focus-visible {
            color: var(--accent);
        }

        .label {
            display: block;
            margin-bottom: 0.6rem;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            min-height: 8.5rem;
            resize: vertical;
            padding: 1rem 1.1rem;
            border: 1px solid rgba(70, 86, 68, 0.18);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.85);
            color: var(--text);
            font: inherit;
            font-size: 1.35rem;
            line-height: 1.55;
        }

        textarea:focus-visible {
            outline: 2px solid rgba(181, 85, 45, 0.35);
            outline-offset: 2px;
        }

        .actions {
            display: flex;
            gap: 0.9rem;
            align-items: center;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        button {
            border: 0;
            border-radius: 999px;
            padding: 0.85rem 1.3rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #fffaf5;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: transform 160ms ease, box-shadow 160ms ease;
            box-shadow: 0 16px 28px rgba(127, 52, 23, 0.22);
        }

        button:hover,
        button:focus-visible {
            transform: translateY(-1px);
            box-shadow: 0 18px 30px rgba(127, 52, 23, 0.28);
        }

        .result {
            min-width: 9rem;
            padding: 0.85rem 1rem;
            border-radius: 16px;
            background: var(--panel-strong);
            border: 1px solid rgba(70, 86, 68, 0.1);
        }

        .result span {
            display: block;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .result strong {
            display: block;
            margin-top: 0.2rem;
            font-size: 2rem;
            color: var(--accent-dark);
        }

        .repo-link {
            display: inline-flex;
            align-items: center;
            gap: 0.7rem;
            margin-top: 1.4rem;
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
        }

        .repo-link svg {
            width: 1.5rem;
            height: 1.5rem;
            fill: currentColor;
        }

        noscript p {
            margin: 0 0 1rem;
            padding: 0.9rem 1rem;
            border-radius: 16px;
            background: rgba(138, 22, 22, 0.1);
            color: #8a1616;
            border: 1px solid rgba(138, 22, 22, 0.18);
        }

        @media (max-width: 860px) {
            .hero,
            .workspace {
                grid-template-columns: 1fr;
            }

            main {
                padding-top: 1.4rem;
            }

            .intro,
            .quick-stats,
            .card {
                padding: 1.3rem;
            }
        }
    </style>
</head>
<body>
<main>
    <noscript>
        <p>JavaScript should be enabled to use the live gematria calculator.</p>
    </noscript>

    <section class="hero">
        <div class="panel intro">
            <span class="eyebrow">Hebrew Numerics</span>
            <h1>Gematria, in one small page.</h1>
            <p class="lead">
                Explore the numeric value of Hebrew text, and try the calculator directly in your browser.
            </p>
        </div>

    </section>

    <section class="workspace">

        <article class="panel card">
            <h2>Try It</h2>
            <label class="label" for="input">Write something in Hebrew</label>
            <textarea id="input" dir="rtl" lang="he">דוגמה</textarea>
            <div class="actions">
                <button id="run" type="button">Calculate Gematria</button>
                <div class="result" aria-live="polite">
                    <span>Result</span>
                    <strong id="output">58</strong>
                </div>
            </div>

            <a class="repo-link" href="https://github.com/shahart/gematria-intellij-plugin" target="_blank" rel="noreferrer">
                <svg aria-hidden="true" viewBox="0 0 16 16" version="1.1">
                    <path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
                </svg>
                View the project on GitHub
            </a>
        </article>
    </section>
</main>

<script>
    function calcGematriaValue(text) {
        let total = 0;
        const aleph = 1488;

        for (const ch of text) {
            const cp = ch.codePointAt(0);
            if (cp >= aleph && cp <= aleph + 9) {
                total += cp - (aleph - 1);
            } else if (cp === aleph + 10 || cp === aleph + 11) {
                total += 20;
            } else if (cp === aleph + 12) {
                total += 30;
            } else if (cp === aleph + 13 || cp === aleph + 14) {
                total += 40;
            } else if (cp === aleph + 15 || cp === aleph + 16 || cp === 1487) {
                total += 50;
            } else if (cp === aleph + 17) {
                total += 60;
            } else if (cp === aleph + 18) {
                total += 70;
            } else if (cp === aleph + 19 || cp === aleph + 20) {
                total += 80;
            } else if (cp === aleph + 21 || cp === aleph + 22) {
                total += 90;
            } else if (cp >= aleph + 23 && cp <= aleph + 26) {
                total += 100 * (cp - (aleph + 23) + 1);
            }
        }

        return total;
    }

    function updateGematria() {
        const input = document.getElementById("input").value;
        document.getElementById("output").textContent = String(calcGematriaValue(input));
    }

    document.getElementById("run").addEventListener("click", updateGematria);
    document.getElementById("input").addEventListener("input", updateGematria);
    updateGematria();
</script>
</body>
</html>
